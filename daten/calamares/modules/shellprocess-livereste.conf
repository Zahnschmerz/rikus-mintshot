# Räumt NUR die Live-Stick-Reste aus dem frisch kopierten Zielsystem.
# 1:1-Klon-Prinzip: Konten, Autologin und alle Einstellungen bleiben unangetastet!
# Entfernt wird ausschließlich, was zum Live-Betrieb gehört:
# - das "System installieren"-Symbol (Benutzer-Vorlage skel + alle Schreibtische)
# - die Live-Autologin-Zusatzdatei (falls sie je den Weg ins Ziel findet)
---
dontChroot: false
timeout: 60
script:
    # 2026-07-14 Fix Login-Schleife: Bei "ohne Home" fehlt /home/<User> im kopierten
    # squashfs -> aus /etc/skel anlegen (sonst startet die Sitzung nicht -> Loop).
    - "-sh -c 'while IFS=: read -r u x id gid gc h s; do [ \"$id\" -ge 1000 ] 2>/dev/null && [ \"$id\" -lt 60000 ] && [ -n \"$h\" ] && [ \"$h\" != / ] && [ ! -d \"$h\" ] && { cp -aT /etc/skel \"$h\"; chown -R \"$u:$u\" \"$h\"; chmod 700 \"$h\"; }; done < /etc/passwd'"
    - "-rm -f /etc/lightdm/lightdm.conf.d/99-live-autologin.conf"
    - "-rm -f /etc/skel/Desktop/system-installieren.desktop /etc/skel/Desktop/refractainstaller.desktop"
    - "-sh -c 'rm -f /home/*/Desktop/system-installieren.desktop /home/*/Schreibtisch/system-installieren.desktop'"
